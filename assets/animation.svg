<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff1a1a" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#1a0000" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a0000" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGlow)" rx="20" />
  
  <!-- Pulsing web circles -->
  <g stroke="#660000" stroke-width="1.5" fill="none">
    <circle cx="200" cy="200" r="30">
      <animate attributeName="r" values="30;60;30" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="200" r="60">
      <animate attributeName="r" values="60;110;60" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="200" r="110">
      <animate attributeName="r" values="110;170;110" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Web lines -->
  <g stroke="#660000" stroke-width="2" opacity="0.6">
    <line x1="200" y1="200" x2="200" y2="0" />
    <line x1="200" y1="200" x2="200" y2="400" />
    <line x1="200" y1="200" x2="0" y2="200" />
    <line x1="200" y1="200" x2="400" y2="200" />
    <line x1="200" y1="200" x2="58" y2="58" />
    <line x1="200" y1="200" x2="341" y2="341" />
    <line x1="200" y1="200" x2="58" y2="341" />
    <line x1="200" y1="200" x2="341" y2="58" />
  </g>

  <!-- Glowing core behind spider -->
  <circle cx="200" cy="200" r="70" fill="url(#glow)">
    <animate attributeName="r" values="60;80;60" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Sleek geometric spider -->
  <g transform="translate(170, 160) scale(1.5)">
    <!-- Spider Body -->
    <path d="M 20 10 L 25 18 L 20 30 L 15 18 Z" fill="#ffffff" />
    <circle cx="20" cy="22" r="3" fill="#ff0000">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite" />
    </circle>
    
    <!-- Legs Left -->
    <path d="M 17 15 L 8 5 L 4 10 M 16 18 L 6 15 L 2 20 M 16 22 L 8 30 L 2 28 M 18 26 L 10 38 L 5 40" stroke="#ffffff" stroke-width="2" fill="none" stroke-linejoin="round" />
    
    <!-- Legs Right -->
    <path d="M 23 15 L 32 5 L 36 10 M 24 18 L 34 15 L 38 20 M 24 22 L 32 30 L 38 28 M 22 26 L 30 38 L 35 40" stroke="#ffffff" stroke-width="2" fill="none" stroke-linejoin="round" />
    
    <!-- Floating animation for spider -->
    <animateTransform attributeName="transform" type="translate" values="170,155; 170,165; 170,155" dur="3s" repeatCount="indefinite" />
  </g>
</svg>
