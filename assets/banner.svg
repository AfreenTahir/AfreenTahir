<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050000" />
      <stop offset="50%" stop-color="#140000" />
      <stop offset="100%" stop-color="#330000" />
    </linearGradient>
    <pattern id="web" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 0 0 L 80 80 M 80 0 L 0 80 M 40 0 L 40 80 M 0 40 L 80 40" stroke="#ff3333" stroke-width="0.5" stroke-opacity="0.1" />
      <circle cx="40" cy="40" r="15" fill="none" stroke="#ff3333" stroke-width="0.5" stroke-opacity="0.1" />
      <circle cx="40" cy="40" r="30" fill="none" stroke="#ff3333" stroke-width="0.5" stroke-opacity="0.1" />
      <circle cx="40" cy="40" r="45" fill="none" stroke="#ff3333" stroke-width="0.5" stroke-opacity="0.1" />
    </pattern>
    <radialGradient id="glow" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff0000" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <rect width="900" height="300" fill="url(#bg)" />
  <rect width="900" height="300" fill="url(#web)" />
  <rect width="900" height="300" fill="url(#glow)" />
  
  <!-- Sleek angled design overlay -->
  <polygon points="0,300 0,0 450,0 350,300" fill="#000000" fill-opacity="0.7" />
  <polygon points="430,0 470,0 370,300 330,300" fill="#cc0000" fill-opacity="0.8" />
  <polygon points="480,0 490,0 390,300 380,300" fill="#ff4d4d" fill-opacity="0.5" />
  
  <!-- Text Elements -->
  <text x="60" y="130" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="900" fill="#ffffff" letter-spacing="3">AFREEN TAHIR</text>
  <text x="60" y="180" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#ff4d4d" letter-spacing="4">BUSINESS DATA ANALYTICS</text>
  
  <!-- Sleek separator line -->
  <line x1="60" y1="210" x2="250" y2="210" stroke="#cc0000" stroke-width="3" />
  
  <text x="60" y="245" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold" fill="#cccccc" letter-spacing="1">> Marketing Strategy | Python | C++</text>
</svg>
