<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#120005" />
      <stop offset="1" stop-color="#3b0000" />
    </linearGradient>
    <style>
      .title { fill: #fff0f0; font-family: 'Segoe UI', Roboto, sans-serif; font-weight:700 }
      .subtitle { fill:#f6dede; font-family: 'Segoe UI', Roboto, sans-serif; font-weight:500 }
      .web { stroke:#6b0000; stroke-width:2; stroke-opacity:0.6; fill:none }
      .spider { fill:#0b0b0b }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#g)" rx="8"/>

  <!-- subtle web background -->
  <g transform="translate(600,140)">
    <g class="web">
      <circle r="120" stroke-opacity="0.18" />
      <circle r="80" stroke-opacity="0.12" />
      <circle r="40" stroke-opacity="0.08" />
      <path d="M-120 0 L120 0 M-85 -85 L85 85 M-85 85 L85 -85" stroke-opacity="0.06" />
    </g>
  </g>

  <!-- decorative spider that 'walks' along a subtle path -->
  <path id="p" d="M420,160 C520,60 680,60 780,160" fill="none" stroke="none"/>
  <g transform="translate(0,0)">
    <circle cx="420" cy="160" r="14" class="spider" />
    <g>
      <circle r="10" cx="0" cy="0" fill="#8b0000" opacity="0.9" />
    </g>
  </g>

  <text x="60" y="110" font-size="48" class="title">Afreen Tahir</text>
  <text x="60" y="160" font-size="20" class="subtitle">BS BDA — Business Development · Marketing · Python · C++</text>

  <!-- decorative right corner web -->
  <g transform="translate(1100,20) scale(0.8)">
    <path d="M0,0 C-20,40 -60,60 -90,40 C-80,20 -40,10 0,0 Z" fill="#2b0000" opacity="0.4"/>
  </g>

  <!-- lightweight animation: a small spider (red dot) moved via SMIL along path -->
  <g>
    <circle r="8" fill="#2d0000">
      <animateMotion dur="6s" repeatCount="indefinite">
        <mpath xlink:href="#p" />
      </animateMotion>
    </circle>
  </g>
</svg>
